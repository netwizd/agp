name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          go build -trimpath -o bin/agp ./cmd/agp
          go build -trimpath -o bin/agpctl ./cmd/agpctl

      - name: Frontend syntax
        run: node --check internal/frontend/static/app.js

      - name: Whitespace
        run: git show --check --format=short --no-renames HEAD
