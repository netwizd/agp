upstream agp_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 443 ssl;
    http2 on;
    server_name portal.company.ru;

    ssl_certificate /etc/letsencrypt/live/portal.company.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.company.ru/privkey.pem;

    access_log /var/log/nginx/agp.access.log;
    error_log /var/log/nginx/agp.error.log warn;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location = /_agp_auth {
        internal;
        proxy_pass http://agp_backend/auth/request;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    location ^~ /anything-needed {
        auth_request /_agp_auth;
        auth_request_set $agp_user $upstream_http_x_agp_user;
        auth_request_set $agp_user_id $upstream_http_x_agp_user_id;
        auth_request_set $agp_groups $upstream_http_x_agp_groups;

        error_page 401 =302 https://portal.company.ru/login;
        error_page 403 =302 https://portal.company.ru/access-denied;

        proxy_pass http://app.internal.local/anything-needed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-AGP-User $agp_user;
        proxy_set_header X-AGP-User-ID $agp_user_id;
        proxy_set_header X-AGP-Groups $agp_groups;
    }

    location / {
        proxy_pass http://agp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /healthz {
        proxy_pass http://agp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /readyz {
        proxy_pass http://agp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://agp_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
